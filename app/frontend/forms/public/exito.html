<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Onboarding Completado!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Estilos específicos para asegurar que el mensaje quede centrado */
        .success-content {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 4rem 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            max-width: 500px;
            width: 90%;
        }
        .success-content h1 { font-size: 2.2rem; color: var(--text-dark); margin-bottom: 0.5rem; }
        .success-content p { font-size: 1.1rem; color: var(--text-light); }
        .success-emoji { font-size: 5rem; display: block; margin-bottom: 1rem; animation: floatEmoji 3s ease-in-out infinite; }
        
        @keyframes popIn { 
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes floatEmoji { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }
        
        @media (max-width: 768px) {
            .success-content { padding: 3rem 1.5rem; }
            .success-content h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="agency-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
        <span>Mi Agencia SaaS</span>
    </div>

    <div class="success-content">
        <span class="success-emoji">🚀</span>
        <h1>¡Ya tus datos fueron enviados!</h1>
        <p>Nos comunicaremos contigo cuando tu sistema esté listo. ✨</p>
    </div>
</body>
</html>
