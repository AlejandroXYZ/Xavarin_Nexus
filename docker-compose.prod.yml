services:
  proxy:
    image: jc21/nginx-proxy-manager:latest
    restart: "always"
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./npm_data:/data
      - ./npm_letsencrypt:/etc/letsencrypt
    networks:
      - main-network
    depends_on:
      - backend

networks:
  main-network:
